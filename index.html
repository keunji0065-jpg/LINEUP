<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBER OFFICIAL LINEUP</title>
    <!-- 디자인(Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 🚨 [매우 중요] 하얗게 뜨는 현상 방지: 불안정한 unpkg 대신 가장 안정적인 cdnjs 사용 및 버전 영구 고정 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin="anonymous"></script>
    
    <!-- 주문서와 동일한 폰트 및 스타일 적용 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f3f4f6; 
            color: #111827; 
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .break-keep { word-break: keep-all; }
        
        /* 시크한 입력창 스타일 */
        .input-chic {
            border-radius: 0;
            border: 1px solid #d1d5db;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }
        .input-chic:focus {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: none;
            outline: none;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <!-- 🚨 스크립트 로딩 지연 시 하얀 화면 대신 보여줄 기본 안내문 -->
    <div id="root">
        <div style="display:flex; height:100vh; align-items:center; justify-content:center; color:#9ca3af; font-size:14px;">
            라인업을 불러오는 중입니다... 잠시만 기다려주세요.
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 🚨 리액트 앱이 뻗었을 때 하얀 화면 대신 에러 안내를 띄워주는 강력한 방어막
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true };
            }
            componentDidCatch(error, errorInfo) {
                console.error("화면 렌더링 중 오류 발생:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50 text-center px-5">
                            <div className="text-4xl mb-4">⚠️</div>
                            <h2 className="text-lg font-bold text-black mb-2">일시적인 오류가 발생했습니다.</h2>
                            <p className="text-sm text-gray-500 mb-6">데이터를 불러오는 중 문제가 생겼습니다.<br/>아래 버튼을 눌러 다시 시도해주세요.</p>
                            <button 
                                onClick={() => window.location.reload()} 
                                className="px-6 py-3 bg-black text-white text-sm font-bold tracking-widest uppercase rounded-sm"
                            >
                                새로고침 하기
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const SearchIcon = ({ size = 18 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );

        // [추가] 새로고침 아이콘
        const RefreshIcon = ({ size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 2.13-5.88L21 8"></path></svg>
        );

        function App() {
          const [allProducts, setAllProducts] = useState([]);
          const [products, setProducts] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [toastMessage, setToastMessage] = useState("");
          const [isLoading, setIsLoading] = useState(true);
          const [selectedImage, setSelectedImage] = useState(null);
          
          // [추가] 수동 새로고침을 위한 상태
          const [refreshKey, setRefreshKey] = useState(0); 

          const [showTopBtn, setShowTopBtn] = useState(false);
          const scrollContainerRef = useRef(null);

          // 장바구니 상태 복원 및 저장
          const [selectedNames, setSelectedNames] = useState(() => {
            try {
              const saved = localStorage.getItem('ember_cart');
              return saved ? JSON.parse(saved) : [];
            } catch (e) {
              return [];
            }
          });

          useEffect(() => {
            localStorage.setItem('ember_cart', JSON.stringify(selectedNames));
          }, [selectedNames]);

          useEffect(() => {
            const fetchSheetData = async () => {
              setIsLoading(true); // 새로고침 버튼을 눌렀을 때 로딩 상태를 켭니다
              try {
                const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRI6cW1MyLv5gbcfsjEyYuMDWdL6jDit_Fuz2ZNXPKwEJZeedXoNorHHhUdsoDnDxBzzrFu6P72WVOy/pub?gid=1797935796&single=true&output=csv";
                const response = await fetch(csvUrl);
                const text = await response.text();
                
                const rows = text.replace(/\r/g, '').split('\n');
                let data = [];
                
                rows.forEach((row, index) => {
                  const cleanRow = row.trim();
                  if (!cleanRow) return;
                  
                  const cols = [];
                  let current = '';
                  let inQuotes = false;
                  
                  for (let i = 0; i < cleanRow.length; i++) {
                    if (cleanRow[i] === '"') {
                      inQuotes = !inQuotes;
                    } else if (cleanRow[i] === ',' && !inQuotes) {
                      cols.push(current.trim());
                      current = '';
                    } else {
                      current += cleanRow[i];
                    }
                  }
                  cols.push(current.trim());
                  
                  // 🚨 데이터 오류 방어막: 강제로 문자로 변환(String)하여 에러 발생 원천 차단
                  if (cols[0]) {
                    const firstColLower = String(cols[0]).toLowerCase();
                    if (firstColLower !== "name" && firstColLower !== "price" && firstColLower !== "상품명") {
                      
                      const rawPrice = cols[1] ? String(cols[1]).trim() : '';
                      const numOnly = rawPrice.replace(/[^0-9-]/g, '');
                      const priceNum = parseInt(numOnly, 10);
                      
                      const isMemo = rawPrice === '-' || (!isNaN(priceNum) && priceNum <= 0);

                      if (!isMemo) {
                        data.push({
                          id: index,
                          name: String(cols[0]),
                          price: cols[1] || '',
                          status: cols[2] ? String(cols[2]).trim() : '',
                          imageUrl: cols[3] ? String(cols[3]).trim() : ''
                        });
                      }
                    }
                  }
                });

                data.sort((a, b) => {
                  const matchA = a.name.match(/^(\d+)/);
                  const numA = matchA ? parseInt(matchA[0]) : 0;
                  
                  const matchB = b.name.match(/^(\d+)/);
                  const numB = matchB ? parseInt(matchB[0]) : 0;
                  
                  if (numA === 0 && numB === 0) {
                    return a.name.localeCompare(b.name);
                  }
                  return numB - numA;
                });
                
                setAllProducts(data);
                setProducts(data);

                // 자동 클렌징: 시트에 없는 상품은 장바구니에서 알아서 삭제
                setSelectedNames(prev => {
                    const currentNames = data.map(p => p.name);
                    return prev.filter(name => currentNames.includes(name));
                });

                setIsLoading(false);
              } catch (error) {
                console.error("데이터 로드 실패:", error);
                setIsLoading(false);
                // 강제 에러 발생 시 ErrorBoundary가 잡도록 처리
                throw new Error("네트워크 오류"); 
              }
            };

            fetchSheetData();
          }, [refreshKey]); // refreshKey가 변경될 때마다 데이터를 다시 불러옵니다.

          useEffect(() => {
            let filtered = allProducts;
            if (searchTerm) {
              filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(searchTerm.toLowerCase())
              );
            }
            setProducts(filtered);
          }, [searchTerm, allProducts]);

          const handleCopyAccount = () => {
            const accountInfo = "카카오뱅크 7942-32-84990 김선정";
            const textArea = document.createElement("textarea");
            textArea.value = accountInfo;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast("계좌번호가 복사되었습니다.");
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const handleCopy = (product, formattedPrice) => {
            const textToCopy = `${product.name} ${formattedPrice}`;
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast(product.name);
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const toggleSelection = (productName) => {
            setSelectedNames(prev => 
              prev.includes(productName) 
                ? prev.filter(name => name !== productName) 
                : [...prev, productName]
            );
          };

          const selectedProducts = allProducts.filter(p => selectedNames.includes(p.name));
          const totalPrice = selectedProducts.reduce((sum, p) => {
            const num = parseInt(p.price.replace(/[^0-9]/g, ''), 10);
            return sum + (isNaN(num) ? 0 : num);
          }, 0);

          const handleCopyAll = () => {
            if (selectedProducts.length === 0) return;
            
            let textToCopy = selectedProducts.map(p => {
               const num = parseInt(p.price.replace(/[^0-9]/g, ''), 10);
               const formattedPrice = isNaN(num) ? p.price : num.toLocaleString();
               return `${p.name} ${formattedPrice}`;
            }).join('\n');
            
            textToCopy += `\n------------------\n총 상품 금액: ${totalPrice.toLocaleString()}원`;

            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast(`총 ${selectedProducts.length}개 상품 복사 완료!`);
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const showToast = (message) => {
              setToastMessage(message);
              setTimeout(() => setToastMessage(""), 2000);
          }

          const handleScroll = (e) => {
            if (e.target.scrollTop > 300) setShowTopBtn(true);
            else setShowTopBtn(false);
          };

          const scrollToTop = () => {
            if (scrollContainerRef.current) {
              scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          return (
            <div className="flex justify-center sm:items-center w-full" style={{ height: '100dvh' }}>
              <div className="w-full max-w-md bg-white h-full relative flex flex-col shadow-2xl sm:h-[800px] sm:rounded-none overflow-hidden">
                
                <header className="py-4 text-center bg-black flex-shrink-0 z-20 relative">
                  <h1 className="text-xl font-serif text-white tracking-[0.25em] ml-1 uppercase">EMBER</h1>
                  <p className="text-[9px] text-gray-400 tracking-[0.2em] uppercase mt-0.5">Official Lineup</p>
                </header>

                <main className="flex-1 flex flex-col bg-white overflow-hidden">
                  
                  <div className="px-5 py-3 border-b border-gray-100 flex-shrink-0">
                    <div className="flex items-center gap-2">
                      <div className="relative flex-1">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <SearchIcon className="text-gray-400" />
                        </div>
                        <input
                          type="text"
                          placeholder="상품명 또는 번호를 검색하세요"
                          className="w-full pl-11 pr-4 py-2.5 input-chic text-sm font-medium tracking-wide text-black placeholder-gray-400"
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                        />
                      </div>
                      
                      {/* [추가] 새로고침 버튼 */}
                      <button 
                        onClick={() => setRefreshKey(prev => prev + 1)}
                        className="shrink-0 w-11 h-11 flex items-center justify-center border border-gray-300 bg-[#fafafa] text-gray-500 hover:text-black hover:border-black transition-all active:scale-95"
                        aria-label="라인업 새로고침"
                      >
                        {/* 로딩 중일 때는 아이콘이 빙글빙글 돕니다 */}
                        <RefreshIcon size={18} className={isLoading ? 'animate-spin text-gray-300' : ''} />
                      </button>
                    </div>
                  </div>

                  <div className="bg-[#f9fafb] px-4 py-3 border-b border-gray-100 flex items-center justify-center gap-1.5 flex-shrink-0 overflow-hidden">
                    <span className="text-[14px] shrink-0">💡</span>
                    <p className="text-[min(12.5px,3.5vw)] text-gray-600 font-medium tracking-tight whitespace-nowrap truncate">
                      체크박스를 선택하면 여러 상품을 <strong className="text-black">한 번에 복사</strong>할 수 있습니다.
                    </p>
                  </div>

                  <div 
                    className="flex-1 overflow-y-auto pb-20"
                    ref={scrollContainerRef}
                    onScroll={handleScroll}
                  >
                    {isLoading ? (
                      <div className="text-center py-20 text-gray-400 text-sm font-medium tracking-wider uppercase">
                        Loading...
                      </div>
                    ) : products.length > 0 ? (
                      <ul className="divide-y divide-gray-200">
                        {products.map((product, index) => {
                          const onlyNumbers = product.price.replace(/[^0-9]/g, '');
                          const num = parseInt(onlyNumbers, 10);
                          const formattedPrice = isNaN(num) ? product.price : num.toLocaleString();
                          const isSoldOut = product.status === '품절';
                          const isChecked = selectedNames.includes(product.name);

                          return (
                            <li 
                              key={product.id} 
                              className={`flex items-center justify-between py-4 px-5 transition-colors group ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}
                            >
                              <div className="flex items-center gap-3 pr-4">
                                <div 
                                  className="shrink-0 flex items-center justify-center cursor-pointer py-2 pr-1"
                                  onClick={() => toggleSelection(product.name)}
                                >
                                  <div className={`w-5 h-5 border flex items-center justify-center transition-colors ${isChecked ? 'bg-black border-black' : 'bg-white border-gray-300'}`}>
                                    {isChecked && (
                                      <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5 text-white" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                      </svg>
                                    )}
                                  </div>
                                </div>

                                {product.imageUrl && (
                                  <div 
                                    className="w-10 h-10 shrink-0 cursor-pointer overflow-hidden rounded-sm border border-gray-200 shadow-sm"
                                    onClick={() => setSelectedImage(product.imageUrl)}
                                  >
                                    <img src={product.imageUrl} alt={product.name} className="w-full h-full object-cover hover:scale-110 transition-transform duration-300" />
                                  </div>
                                )}
                                
                                <div className="flex flex-col gap-1">
                                  <div className="flex items-center gap-2">
                                    <span className={`text-[14px] font-medium leading-snug break-keep tracking-wide ${isSoldOut ? 'text-gray-500' : 'text-black'}`}>
                                      {product.name}
                                    </span>
                                    {isSoldOut && (
                                      <span className="text-[10px] bg-red-600 text-white px-1.5 py-0.5 tracking-wider font-bold shrink-0">
                                        품절
                                      </span>
                                    )}
                                  </div>
                                </div>
                              </div>
                              
                              <div className="flex items-center gap-4 shrink-0">
                                <div className={`text-[15px] font-bold tracking-wider ${isSoldOut ? 'text-gray-500' : 'text-black'}`}>
                                  {formattedPrice}
                                </div>
                                <button 
                                  onClick={() => handleCopy(product, formattedPrice)}
                                  className="border border-black text-black px-3 py-1.5 text-[14px] font-bold tracking-wider hover:bg-black hover:text-white transition-all bg-white flex items-center justify-center active:scale-95"
                                >
                                  복사
                                </button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    ) : (
                      <div className="flex flex-col items-center justify-center py-24 px-6 text-center">
                        <div className="text-gray-300 mb-3">
                          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        <p className="text-gray-500 text-[14px] font-medium tracking-wide mb-1">
                          검색 결과가 없습니다.
                        </p>
                        <p className="text-gray-400 text-[12px] tracking-tight break-keep leading-relaxed mt-2">
                          찾으시는 상품이 라인업에 없다면,<br/>
                          <strong className="text-gray-600 font-bold">카톡채널 채팅창</strong> 또는 <strong className="text-gray-600 font-bold">배송지 입력시</strong><br/>직접 입력해주세요.
                        </p>
                      </div>
                    )}
                  </div>
                  
                  <footer className={`py-8 text-center text-gray-400 text-[10px] border-t border-gray-100 bg-white uppercase tracking-widest mt-auto ${selectedNames.length > 0 ? 'pb-28' : ''}`}>
                      <p className="mb-1">Ember Sister Official</p>
                      <p>System by. 깔로</p>
                  </footer>
                </main>

                {}
                {selectedNames.length > 0 && (
                  <div className="absolute bottom-0 left-0 right-0 bg-black text-white px-3 sm:px-5 py-4 flex items-center justify-between z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.15)] animate-fade-in">
                    <div className="flex flex-col shrink-0 pr-2">
                      <div className="text-[9px] text-gray-400 tracking-wider mb-0.5">
                        {selectedNames.length}개 선택됨
                      </div>
                      <div className="text-[15px] sm:text-lg font-bold font-serif tracking-widest">
                        {totalPrice.toLocaleString()}
                      </div>
                    </div>
                    <div className="flex gap-1.5 sm:gap-2 shrink-0">
                      <button 
                        onClick={handleCopyAccount}
                        className="px-2 sm:px-3 py-2 border border-gray-600 text-gray-300 text-[10px] font-bold tracking-wider hover:bg-gray-800 transition-colors"
                      >
                        계좌복사
                      </button>
                      <button 
                        onClick={() => setSelectedNames([])}
                        className="px-2 sm:px-3 py-2 border border-gray-600 text-gray-300 text-[10px] font-bold tracking-wider hover:bg-gray-800 transition-colors"
                      >
                        초기화
                      </button>
                      <button 
                        onClick={handleCopyAll}
                        className="px-3 sm:px-4 py-2 bg-white text-black text-[10px] sm:text-[12px] font-bold tracking-widest hover:bg-gray-200 transition-colors"
                      >
                        전체 복사
                      </button>
                    </div>
                  </div>
                )}

                {showTopBtn && (
                  <button
                    onClick={scrollToTop}
                    className={`absolute right-6 w-11 h-11 bg-black text-white rounded-full shadow-[0_4px_14px_0_rgba(0,0,0,0.39)] flex items-center justify-center animate-fade-in z-30 hover:scale-105 transition-transform ${selectedNames.length > 0 ? 'bottom-24' : 'bottom-10'}`}
                    aria-label="맨 위로 가기"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" />
                    </svg>
                  </button>
                )}

                {toastMessage && (
                  <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black text-white px-6 py-4 text-[13px] font-bold tracking-widest shadow-2xl z-50 whitespace-nowrap animate-fade-in border border-white/20 rounded-md">
                    {toastMessage}
                  </div>
                )}
                
                {selectedImage && (
                  <div 
                    className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-80 p-5 animate-fade-in"
                    onClick={() => setSelectedImage(null)}
                  >
                    <div className="relative max-w-md w-full flex flex-col items-end">
                      <button 
                        className="text-white text-3xl font-light hover:text-gray-300 transition-colors mb-2"
                        onClick={() => setSelectedImage(null)}
                      >
                        &times;
                      </button>
                      <img 
                        src={selectedImage} 
                        alt="Product Detail" 
                        className="w-full h-auto max-h-[80vh] object-contain rounded-sm shadow-2xl"
                        onClick={(e) => e.stopPropagation()} 
                      />
                    </div>
                  </div>
                )}
                
              </div>
            </div>
          );
        }

        // 앱 렌더링 시 ErrorBoundary로 감싸서 실행
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
