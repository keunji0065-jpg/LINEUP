<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBER OFFICIAL LINEUP</title>
    <!-- 디자인(Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 리액트(React) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f3f4f6; 
            color: #111827; 
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .break-keep { word-break: keep-all; }
        
        .input-chic {
            border-radius: 0;
            border: 1px solid #d1d5db;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }
        .input-chic:focus {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: none;
            outline: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <div id="root"></div>

    <script type="text/babel">
        // useRef 추가 (스크롤 감지용)
        const { useState, useEffect, useRef } = React;

        const SearchIcon = ({ size = 18 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );

        function App() {
          const [allProducts, setAllProducts] = useState([]);
          const [products, setProducts] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [toastMessage, setToastMessage] = useState("");
          const [isLoading, setIsLoading] = useState(true);
          const [selectedImage, setSelectedImage] = useState(null); 

          // 맨 위로 가기 버튼 관련 상태 및 참조
          const [showTopBtn, setShowTopBtn] = useState(false);
          const scrollContainerRef = useRef(null);

          // 장바구니(다중 선택) 상태 - 브라우저 메모리(localStorage) 연동
          const [selectedNames, setSelectedNames] = useState(() => {
            try {
              const saved = localStorage.getItem('ember_cart');
              return saved ? JSON.parse(saved) : [];
            } catch (e) {
              return [];
            }
          });

          // 데이터 불러오기
          useEffect(() => {
            const fetchSheetData = async () => {
              try {
                const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRI6cW1MyLv5gbcfsjEyYuMDWdL6jDit_Fuz2ZNXPKwEJZeedXoNorHHhUdsoDnDxBzzrFu6P72WVOy/pub?gid=1797935796&single=true&output=csv";
                const response = await fetch(csvUrl);
                const text = await response.text();
                
                const rows = text.replace(/\r/g, '').split('\n');
                let data = [];
                
                rows.forEach((row, index) => {
                  const cleanRow = row.trim();
                  if (!cleanRow) return;
                  
                  const cols = [];
                  let current = '';
                  let inQuotes = false;
                  
                  for (let i = 0; i < cleanRow.length; i++) {
                    if (cleanRow[i] === '"') {
                      inQuotes = !inQuotes;
                    } else if (cleanRow[i] === ',' && !inQuotes) {
                      cols.push(current.trim());
                      current = '';
                    } else {
                      current += cleanRow[i];
                    }
                  }
                  cols.push(current.trim());
                  
                  if (cols[0]) {
                    const firstColLower = cols[0].toLowerCase();
                    if (firstColLower !== "name" && firstColLower !== "price" && firstColLower !== "상품명") {
                      
                      // 0이나 - 가격 필터링 (메모용 숨김 처리)
                      const rawPrice = cols[1] ? cols[1].trim() : '';
                      const numOnly = rawPrice.replace(/[^0-9-]/g, '');
                      const priceNum = parseInt(numOnly, 10);
                      const isMemo = rawPrice === '-' || (!isNaN(priceNum) && priceNum <= 0);

                      if (!isMemo) {
                        data.push({
                          id: index,
                          name: cols[0],
                          price: cols[1] || '',
                          status: cols[2] ? cols[2].trim() : '',   
                          imageUrl: cols[3] ? cols[3].trim() : ''  
                        });
                      }
                    }
                  }
                });

                // 번호 기준 정렬 (숫자 내림차순, 없으면 가나다순)
                data.sort((a, b) => {
                  const matchA = a.name.match(/^(\d+)/);
                  const numA = matchA ? parseInt(matchA[0]) : 0;
                  
                  const matchB = b.name.match(/^(\d+)/);
                  const numB = matchB ? parseInt(matchB[0]) : 0;
                  
                  if (numA === 0 && numB === 0) {
                    return a.name.localeCompare(b.name);
                  }
                  return numB - numA;
                });
                
                setAllProducts(data);
                setProducts(data);

                // 🚨 자동 클렌징(Auto-Cleansing) 로직: 새 방송 시작 시 옛날 장바구니 리셋
                setSelectedNames(prevCart => {
                  const currentProductNames = data.map(p => p.name);
                  const validCartItems = prevCart.filter(cartItem => currentProductNames.includes(cartItem));
                  
                  if (validCartItems.length !== prevCart.length) {
                    localStorage.setItem('ember_cart', JSON.stringify(validCartItems));
                  }
                  return validCartItems;
                });

                setIsLoading(false);
              } catch (error) {
                console.error("데이터를 불러오는데 실패했습니다.", error);
                setIsLoading(false);
              }
            };

            fetchSheetData();
          }, []);

          // 검색 필터
          useEffect(() => {
            let filtered = allProducts;
            if (searchTerm) {
              filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(searchTerm.toLowerCase())
              );
            }
            setProducts(filtered);
          }, [searchTerm, allProducts]);

          // 장바구니 변경 시 저장
          useEffect(() => {
            localStorage.setItem('ember_cart', JSON.stringify(selectedNames));
          }, [selectedNames]);

          // 스크롤 감지 (TOP 버튼 표시용)
          const handleScroll = (e) => {
            if (e.target.scrollTop > 300) {
              setShowTopBtn(true);
            } else {
              setShowTopBtn(false);
            }
          };

          // 맨 위로 부드럽게 스크롤
          const scrollToTop = () => {
            if (scrollContainerRef.current) {
              scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const toggleSelection = (productName) => {
            setSelectedNames(prev => 
              prev.includes(productName) 
                ? prev.filter(name => name !== productName) 
                : [...prev, productName]
            );
          };

          // 총 금액 계산
          const selectedProducts = allProducts.filter(p => selectedNames.includes(p.name));
          const totalPrice = selectedProducts.reduce((sum, p) => {
            const num = parseInt(p.price.replace(/[^0-9]/g, ''), 10);
            return sum + (isNaN(num) ? 0 : num);
          }, 0);

          // 다중 복사 기능
          const handleCopyAll = () => {
            if (selectedProducts.length === 0) return;
            
            let textToCopy = selectedProducts.map(p => {
               const num = parseInt(p.price.replace(/[^0-9]/g, ''), 10);
               const formattedPrice = isNaN(num) ? p.price : num.toLocaleString();
               return `${p.name} ${formattedPrice}`;
            }).join('\n');
            
            textToCopy += `\n------------------\n총 상품 금액: ${totalPrice.toLocaleString()}원`;

            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast(`총 ${selectedProducts.length}개 상품 복사 완료!`);
            } catch (err) {
              console.error('복사 실패', err);
            }
            document.body.removeChild(textArea);
          };

          // 단일 상품 복사 기능
          const handleCopy = (product, formattedPrice) => {
            const textToCopy = `${product.name} ${formattedPrice}`;
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast(product.name);
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const showToast = (message) => {
              setToastMessage(message);
              setTimeout(() => setToastMessage(""), 2000);
          }

          return (
            // 1. 전체 레이아웃을 화면 꽉 차게(100dvh) 고정시켜서 하단 결제 바가 항상 화면 밑에 붙어있게 만듭니다.
            <div className="flex justify-center sm:items-center w-full" style={{ height: '100dvh' }}>
              <div className="w-full max-w-md bg-white h-full relative flex flex-col shadow-2xl sm:h-[800px] sm:rounded-none overflow-hidden">
                
                {/* 상단 블랙 헤더 여백(py)과 글씨 크기 축소 */}
                <header className="py-4 text-center bg-black flex-shrink-0 z-20">
                  <h1 className="text-xl font-serif text-white tracking-[0.25em] ml-1 uppercase">EMBER</h1>
                  <p className="text-[9px] text-gray-400 tracking-[0.2em] uppercase mt-0.5">Official Lineup</p>
                </header>

                <main className="flex-1 flex flex-col bg-white overflow-hidden">
                  
                  {/* 검색창 상하 여백(py)을 절반으로 줄이고, 입력칸 자체의 높이도 슬림하게 조정 */}
                  <div className="px-5 py-3 border-b border-gray-100 flex-shrink-0">
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <SearchIcon className="text-gray-400" />
                      </div>
                      <input
                        type="text"
                        placeholder="상품명 또는 번호를 검색하세요"
                        className="w-full pl-11 pr-4 py-2.5 input-chic text-sm font-medium tracking-wide text-black placeholder-gray-400"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                  </div>

                  {/* 안내 멘트 배너: 글씨를 짧게 다듬고, 화면 크기에 맞춰 무조건 한 줄에 쏙 들어가게 자동 축소 적용 */}
                  <div className="bg-[#f9fafb] px-4 py-2.5 border-b border-gray-100 flex items-center justify-center gap-1.5 flex-shrink-0 overflow-hidden">
                    <span className="text-[min(12px,3.5vw)] shrink-0">💡</span>
                    <p className="text-[min(11px,3.2vw)] text-gray-600 font-medium tracking-tight whitespace-nowrap">
                      체크박스를 선택하면 여러 상품을 <strong className="text-black">한 번에 복사</strong>할 수 있습니다.
                    </p>
                  </div>

                  {/* 스크롤 감지 영역 (이 부분만 스크롤되도록 구조 변경 완료) */}
                  <div 
                    className="flex-1 overflow-y-auto pb-20"
                    ref={scrollContainerRef}
                    onScroll={handleScroll}
                  >
                    {isLoading ? (
                      <div className="text-center py-20 text-gray-400 text-sm font-medium tracking-wider uppercase">
                        Loading...
                      </div>
                    ) : products.length > 0 ? (
                      <ul className="divide-y divide-gray-200">
                        {products.map((product, index) => {
                          const onlyNumbers = product.price.replace(/[^0-9]/g, '');
                          const num = parseInt(onlyNumbers, 10);
                          const formattedPrice = isNaN(num) ? product.price : num.toLocaleString();
                          const isSoldOut = product.status === '품절';

                          return (
                            <li 
                              key={product.id} 
                              className={`flex items-center justify-between py-4 px-5 transition-colors group ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}
                            >
                              <div className="flex items-center gap-3 pr-4">
                                
                                {/* 장바구니 체크박스 */}
                                <div 
                                  className="shrink-0 flex items-center justify-center cursor-pointer py-2 pr-1"
                                  onClick={() => toggleSelection(product.name)}
                                >
                                  <div className={`w-5 h-5 border flex items-center justify-center transition-colors ${selectedNames.includes(product.name) ? 'bg-black border-black' : 'bg-white border-gray-300'}`}>
                                    {selectedNames.includes(product.name) && (
                                      <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5 text-white" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                      </svg>
                                    )}
                                  </div>
                                </div>

                                {product.imageUrl && (
                                  <div 
                                    className="w-10 h-10 shrink-0 cursor-pointer overflow-hidden rounded-sm border border-gray-200 shadow-sm"
                                    onClick={() => setSelectedImage(product.imageUrl)}
                                  >
                                    <img src={product.imageUrl} alt={product.name} className="w-full h-full object-cover hover:scale-110 transition-transform duration-300" />
                                  </div>
                                )}
                                
                                <div className="flex items-center gap-2">
                                  <span className={`text-[14px] font-medium leading-snug break-keep tracking-wide ${isSoldOut ? 'text-gray-500' : 'text-black'}`}>
                                    {product.name}
                                  </span>
                                  {isSoldOut && (
                                    <span className="text-[10px] bg-red-600 text-white px-1.5 py-0.5 tracking-wider font-bold shrink-0">
                                      품절
                                    </span>
                                  )}
                                </div>
                              </div>
                              
                              <div className="flex items-center gap-4 shrink-0">
                                <div className={`text-[15px] font-bold tracking-wider ${isSoldOut ? 'text-gray-500' : 'text-black'}`}>
                                  {formattedPrice}
                                </div>
                                <button 
                                  onClick={() => handleCopy(product, formattedPrice)}
                                  className="border border-black text-black px-3 py-1.5 text-[14px] font-bold tracking-wider hover:bg-black hover:text-white transition-all bg-white flex items-center justify-center active:scale-95"
                                >
                                  복사
                                </button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    ) : (
                      <div className="text-center py-20 text-gray-400 text-sm tracking-wide">
                        검색 결과가 없습니다.
                      </div>
                    )}
                    
                    {/* 하단 여백 및 카피라이트 */}
                    <footer className={`py-8 text-center text-gray-400 text-[10px] border-t border-gray-100 bg-white uppercase tracking-widest mt-auto ${selectedNames.length > 0 ? 'pb-28' : ''}`}>
                        <p className="mb-1">Ember Sister Official</p>
                        <p>System by. 깔로</p>
                    </footer>
                  </div>
                </main>

                {/* 다중 선택 하단 결제 바 */}
                {selectedNames.length > 0 && (
                  <div className="absolute bottom-0 left-0 right-0 bg-black text-white px-5 py-4 flex items-center justify-between z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.15)] animate-fade-in">
                    <div className="flex flex-col">
                      <div className="text-[10px] text-gray-400 tracking-wider mb-0.5">
                        {selectedNames.length}개 상품 선택됨
                      </div>
                      <div className="text-lg font-bold font-serif tracking-widest">
                        {totalPrice.toLocaleString()}
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => setSelectedNames([])}
                        className="px-3 py-2 border border-gray-600 text-gray-300 text-[10px] font-bold tracking-widest uppercase hover:bg-gray-800 transition-colors"
                      >
                        초기화
                      </button>
                      <button 
                        onClick={handleCopyAll}
                        className="px-4 py-2 bg-white text-black text-[12px] font-bold tracking-widest uppercase hover:bg-gray-200 transition-colors"
                      >
                        전체 복사
                      </button>
                    </div>
                  </div>
                )}

                {/* 맨 위로 가기 (TOP) 버튼 */}
                {showTopBtn && (
                  <button
                    onClick={scrollToTop}
                    className={`absolute right-6 w-11 h-11 bg-black text-white rounded-full shadow-[0_4px_14px_0_rgba(0,0,0,0.39)] flex items-center justify-center animate-fade-in z-30 hover:scale-105 transition-transform ${selectedNames.length > 0 ? 'bottom-24' : 'bottom-10'}`}
                    aria-label="맨 위로 가기"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" />
                    </svg>
                  </button>
                )}

                {/* 토스트 메시지 */}
                {toastMessage && (
                  <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black text-white px-6 py-4 text-[13px] font-bold tracking-widest shadow-2xl z-50 whitespace-nowrap animate-fade-in border border-white/20 rounded-md">
                    {toastMessage}
                  </div>
                )}
                
                {/* 사진 모달창 */}
                {selectedImage && (
                  <div 
                    className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-80 p-5 animate-fade-in"
                    onClick={() => setSelectedImage(null)}
                  >
                    <div className="relative max-w-md w-full flex flex-col items-end">
                      <button 
                        className="text-white text-3xl font-light hover:text-gray-300 transition-colors mb-2"
                        onClick={() => setSelectedImage(null)}
                      >
                        &times;
                      </button>
                      <img 
                        src={selectedImage} 
                        alt="Product Detail" 
                        className="w-full h-auto max-h-[80vh] object-contain rounded-sm shadow-2xl"
                        onClick={(e) => e.stopPropagation()} 
                      />
                    </div>
                  </div>
                )}
                
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
